<script>
(function(){
  var panelOpen=false;
  var fontOn=false,contrastOn=false,linksOn=false;
  window.toggleAccessPanel=function(){panelOpen=!panelOpen;document.getElementById('accessPanel').classList.toggle('open',panelOpen);};
  document.addEventListener('click',function(e){if(panelOpen&&!e.target.closest('#accessPanel')&&!e.target.closest('.float-access')){panelOpen=false;document.getElementById('accessPanel').classList.remove('open');}});
  window.toggleFontSize=function(){fontOn=!fontOn;document.documentElement.style.fontSize=fontOn?'118%':'';document.getElementById('accFont').classList.toggle('on',fontOn);};
  window.toggleContrast=function(){contrastOn=!contrastOn;document.body.style.filter=contrastOn?'contrast(1.25)':'';document.getElementById('accContrast').classList.toggle('on',contrastOn);};
  window.toggleLinks=function(){linksOn=!linksOn;var s=document.getElementById('_accLinksStyle');if(!s){s=document.createElement('style');s.id='_accLinksStyle';document.head.appendChild(s);}s.textContent=linksOn?'a{text-decoration:underline!important;font-weight:700!important}':'';document.getElementById('accLinks').classList.toggle('on',linksOn);};
})();
