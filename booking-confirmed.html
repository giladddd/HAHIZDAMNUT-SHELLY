<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap">
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>הפגישה נקבעה — מלא שאלון הכנה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#F2F7FD;color:#0F172A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:520px;width:100%;background:#fff;border-radius:20px;padding:36px 28px;text-align:center;box-shadow:0 8px 32px rgba(15,23,42,.1)}
.ic{font-size:3rem;margin-bottom:12px}
h1{font-size:1.6rem;font-weight:900;margin-bottom:10px;line-height:1.35}
p{color:#64748B;line-height:1.7;margin-bottom:22px;font-size:.98rem}
.btn{display:inline-block;background:linear-gradient(135deg,#1A56A0,#0F3873);color:#fff;text-decoration:none;font-weight:800;padding:15px 32px;border-radius:50px;font-size:1.05rem}
.note{margin-top:18px;font-size:.85rem;color:#94A3B8}
</style>
</head>
<body>
<div class="card">
  <div class="ic">✅</div>
  <h1>מעולה! הפגישה נקבעה</h1>
  <p>עכשיו צעד אחרון — מלא/י את <strong>שאלון ההכנה</strong> כדי שנוכל להתאים את הפגישה אליך.</p>
  <a class="btn" id="goQuestionnaire" href="pre-meeting.html">מלא שאלון הכנה ←</a>
  <p class="note">הקישור נשלח גם למייל שלך (אחרי הגדרת השרת).</p>
</div>
<script src="assets/js/hahizd-common.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var name =
    params.get('name') ||
    params.get('invitee_name') ||
    params.get('first_name') ||
    '';
  var email =
    params.get('email') ||
    params.get('invitee_email') ||
    '';

  var q = new URLSearchParams();
  if (name) q.set('name', name);
  if (email) q.set('email', email);
  var qs = q.toString();
  var url = 'pre-meeting.html' + (qs ? '?' + qs : '');
  document.getElementById('goQuestionnaire').href = url;

  if (email && window.Hahizd) {
    Hahizd.submit({
      form_type: 'calendly_booking',
      name: name,
      email: email,
      timestamp: new Date().toLocaleString('he-IL'),
    });
  }
})();
</script>
</body>
</html>
